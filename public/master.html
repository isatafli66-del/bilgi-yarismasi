<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Süper Admin | Tazzy Cloud</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; margin: 0; padding: 30px; color: #e2e8f0; }
        .header { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border-bottom: 4px solid #3b82f6; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; color: #3b82f6; font-size: 32px; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .header p { color: #94a3b8; margin: 8px 0 0 0; font-size: 15px; }
        
        .container { display: flex; gap: 30px; max-width: 1300px; margin: 0 auto; flex-wrap: wrap; }
        .panel { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .form-panel { flex: 1; min-width: 350px; border-top: 4px solid #10b981; }
        .list-panel { flex: 2; min-width: 550px; border-top: 4px solid #8b5cf6; }
        
        h2 { padding-bottom: 15px; margin-top: 0; border-bottom: 1px solid #334155; }
        .form-panel h2 { color: #10b981; }
        .list-panel h2 { color: #8b5cf6; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 600; }
        input[type="text"], input[type="date"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; box-sizing: border-box; background: #0f172a; color: white; font-size: 16px; transition: 0.3s; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        
        .checkbox-kutu { display: flex; align-items: center; gap: 15px; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 25px; cursor: pointer; }
        .checkbox-kutu input { width: 24px; height: 24px; cursor: pointer; margin: 0; }
        .checkbox-kutu span { font-size: 16px; font-weight: bold; color: #e2e8f0; }

        .logo-onizleme-kutu { text-align: center; margin-bottom: 15px; padding: 10px; background: #0f172a; border-radius: 8px; border: 1px dashed #334155; }
        #k_logo_onizleme { max-height: 70px; border-radius: 4px; display: none; margin: 0 auto; }

        button { background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-kirmizi { background: #ef4444; }
        .btn-kirmizi:hover { background: #dc2626; }
        .btn-sari { background: #f59e0b; color: #000; }
        .btn-sari:hover { background: #d97706; }
        .btn-kucuk { padding: 10px 15px; font-size: 13px; width: auto; border-radius: 6px; }
        
        .kurum-kart { background: #0f172a; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #10b981; border-bottom: 1px solid #334155; transition: 0.2s; }
        .kurum-kart:hover { background: #162238; }
        .kurum-kart.pasif { border-left-color: #ef4444; opacity: 0.7; }
        .kurum-bilgi strong { font-size: 22px; color: #fff; display: block; margin-bottom: 12px; }
        .kurum-bilgi span { display: inline-block; background: #1e293b; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #94a3b8; margin-right: 10px; border: 1px solid #334155; }
        .durum-etiket { font-weight: bold; }
        .aksiyon-btnler { display: flex; gap: 10px; }

        .footer-logo { text-align: center; margin-top: 50px; opacity: 0.9; }
        .footer-logo img { height: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚡ TAZZY CLOUD MASTER ⚡</h1>
        <p>Multi-Tenant Lisans ve Müşteri Yönetim Merkezi</p>
    </div>

    <div class="container">
        <!-- SOL PANEL -->
        <div class="panel form-panel">
            <h2>➕ Yeni Kurum Lisansı Aç</h2>
            
            <div class="form-group">
                <label>Kurum Kodu (Kullanıcı Adı):</label>
                <input type="text" id="k_kodu" placeholder="Örn: CAFE-BOSPHORUS">
            </div>
            
            <div class="form-group">
                <label>Kurum Yönetici Şifresi:</label>
                <input type="text" id="k_sifre" placeholder="Örn: cafe1234">
            </div>
            
            <div class="form-group">
                <label>Lisans Bitiş Tarihi:</label>
                <input type="date" id="k_bitis">
            </div>
            
            <div class="form-group">
                <label>🏢 Kurum Logosu Yükle (İsteğe Bağlı):</label>
                <div class="logo-onizleme-kutu">
                    <img id="k_logo_onizleme" src="">
                    <span id="logoYokMetin" style="color:#64748b; font-size:13px;">Seçili logo yok</span>
                </div>
                <input type="file" id="k_logo_input" accept="image/*">
                <button onclick="logoyuTemizle()" class="btn-kirmizi" style="margin-top: 10px; padding: 8px; font-size: 13px;">Logoyu Kaldır</button>
            </div>

            <label class="checkbox-kutu">
                <input type="checkbox" id="k_aktif" checked>
                <span>Kurum Şu An Aktif Mi?</span>
            </label>

            <button onclick="kurumKaydet()">💾 Lisansı Kaydet / Güncelle</button>
        </div>

        <!-- SAĞ PANEL -->
        <div class="panel list-panel">
            <h2>🏢 Aktif / Pasif Müşteriler</h2>
            <div id="kurumlarListesi"></div>
        </div>
    </div>

    <div class="footer-logo"><img src="Tazzy Beyaz.png" alt="Tazzy"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let seciliLogoBase64 = undefined; // undefined = logoya dokunma, null = logoyu sil, string = yeni logo
        
        socket.emit('master_veri_istek');

        // Dosya seçildiğinde önizleme yap
        document.getElementById('k_logo_input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    seciliLogoBase64 = evt.target.result;
                    document.getElementById('k_logo_onizleme').src = seciliLogoBase64;
                    document.getElementById('k_logo_onizleme').style.display = 'block';
                    document.getElementById('logoYokMetin').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        function logoyuTemizle() {
            seciliLogoBase64 = null; // Sunucuya null gidecek ve logo silinecek
            document.getElementById('k_logo_input').value = "";
            document.getElementById('k_logo_onizleme').style.display = 'none';
            document.getElementById('k_logo_onizleme').src = "";
            document.getElementById('logoYokMetin').style.display = 'inline';
        }

        socket.on('master_veriler', (kurumlar) => {
            const liste = document.getElementById('kurumlarListesi');
            liste.innerHTML = "";
            const bugun = new Date();

            Object.keys(kurumlar).forEach(kodu => {
                const k = kurumlar[kodu];
                const lisansBittiMi = bugun > new Date(k.bitis);
                let durumMetni = "";
                if(!k.aktif) durumMetni = "<span class='durum-etiket' style='color:#ef4444; border-color:#ef4444;'>Askıya Alınmış</span>";
                else if(lisansBittiMi) durumMetni = "<span class='durum-etiket' style='color:#ef4444; border-color:#ef4444;'>Lisans Dolmuş</span>";
                else durumMetni = "<span class='durum-etiket' style='color:#10b981; border-color:#10b981;'>Aktif</span>";

                liste.innerHTML += `
                    <div class="kurum-kart ${(!k.aktif || lisansBittiMi) ? 'pasif' : ''}">
                        <div class="kurum-bilgi">
                            <strong>${kodu}</strong>
                            <span>🔑 Şifre: ${k.sifre}</span>
                            <span>📅 Bitiş: ${k.bitis}</span>
                            ${durumMetni}
                        </div>
                        <div class="aksiyon-btnler">
                            <button class="btn-kucuk btn-sari" onclick="duzenle('${kodu}', '${k.sifre}', '${k.bitis}', ${k.aktif})">Düzenle</button>
                            <button class="btn-kucuk btn-kirmizi" onclick="kurumSil('${kodu}')">Sil</button>
                        </div>
                    </div>
                `;
            });
        });

        function kurumKaydet() {
            const kodu = document.getElementById('k_kodu').value.trim();
            const sifre = document.getElementById('k_sifre').value.trim();
            const bitis = document.getElementById('k_bitis').value;
            const aktif = document.getElementById('k_aktif').checked;

            if(!kodu || !sifre || !bitis) { alert("Lütfen kod, şifre ve bitiş tarihini boş bırakmayın."); return; }

            // Logo varsa veya silindiyse gönder, yoksa undefined gönder
            socket.emit('master_kurum_ekle_guncelle', { kodu, sifre, bitis, aktif, logoBase64: seciliLogoBase64 });
            
            document.getElementById('k_kodu').value = ""; document.getElementById('k_sifre').value = ""; document.getElementById('k_bitis').value = "";
            logoyuTemizle(); seciliLogoBase64 = undefined;
        }

        function duzenle(kodu, sifre, bitis, aktif) {
            document.getElementById('k_kodu').value = kodu;
            document.getElementById('k_sifre').value = sifre;
            document.getElementById('k_bitis').value = bitis;
            document.getElementById('k_aktif').checked = aktif;
            
            // Düzenleye basınca sunucudan mevcut logoyu isteyelim
            socket.emit('master_kurum_detay_istek', kodu);
        }

        socket.on('master_kurum_detay_cevap', (data) => {
            if(data.logo) {
                seciliLogoBase64 = undefined; // Dokunmazsan eski logo kalır
                document.getElementById('k_logo_onizleme').src = data.logo;
                document.getElementById('k_logo_onizleme').style.display = 'block';
                document.getElementById('logoYokMetin').style.display = 'none';
            } else {
                logoyuTemizle(); seciliLogoBase64 = undefined;
            }
        });

        function kurumSil(kodu) { if(confirm(`DİKKAT! ${kodu} kurumunun sisteme girişini tamamen silmek istiyor musunuz?`)) { socket.emit('master_kurum_sil', kodu); } }
    </script>
</body>
</html>
